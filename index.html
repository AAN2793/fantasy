<html lang="en">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fantasy Tracker</title>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #030712;
    color: #f3f4f6;
    min-height: 100vh;
  }
  button { cursor: pointer; font-family: inherit; border: none; }
  input, select { font-family: inherit; }
  .app { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #1f2937;
  }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: #60a5fa; }
  .week-badge {
    background: #1e3a8a; color: #bfdbfe; padding: 6px 12px;
    border-radius: 6px; font-size: 12px; font-weight: 600;
  }
  .tabs {
    display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #1f2937;
    overflow-x: auto;
  }
  .tab {
    padding: 10px 16px; background: transparent; color: #9ca3af;
    font-size: 14px; font-weight: 600; border-bottom: 2px solid transparent;
    white-space: nowrap; transition: all 0.15s;
  }
  .tab:hover { color: #f3f4f6; }
  .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
  .card {
    background: #111827; border: 1px solid #1f2937; border-radius: 12px;
    padding: 16px; margin-bottom: 16px;
  }
  .card h2 {
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    color: #9ca3af; text-transform: uppercase; margin-bottom: 12px;
  }
  .hero {
    background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
    padding: 24px; border-radius: 12px; margin-bottom: 16px;
  }
  .hero-label { font-size: 11px; color: #93c5fd; font-weight: 700; letter-spacing: 1.5px; }
  .hero-name { font-size: 28px; font-weight: 800; color: #fff; margin-top: 6px; }
  .hero-stats { display: flex; gap: 28px; margin-top: 14px; flex-wrap: wrap; }
  .hero-stat-label { font-size: 10px; color: #93c5fd; letter-spacing: 1px; font-weight: 600; }
  .hero-stat-val { font-size: 22px; font-weight: 800; color: #fff; margin-top: 2px; }
  .player-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-bottom: 1px solid #1f2937; font-size: 14px;
  }
  .player-row:last-child { border-bottom: none; }
  .slot-label {
    width: 44px; font-size: 10px; font-weight: 700; color: #9ca3af;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .pos-badge {
    display: inline-block; padding: 2px 8px; border-radius: 5px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px; min-width: 34px; text-align: center;
  }
  .pos-QB { background: #ef444422; color: #f87171; }
  .pos-RB { background: #22c55e22; color: #4ade80; }
  .pos-WR { background: #3b82f622; color: #60a5fa; }
  .pos-TE { background: #f59e0b22; color: #fbbf24; }
  .pos-K  { background: #a855f722; color: #c084fc; }
  .pos-DEF{ background: #6b728022; color: #9ca3af; }
  .status-badge {
    padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600;
  }
  .status-Questionable { background: #f59e0b22; color: #fbbf24; }
  .status-IR, .status-Out { background: #ef444422; color: #f87171; }
  .player-name { flex: 1; min-width: 0; }
  .player-name .n { font-weight: 600; color: #f3f4f6; }
  .player-name .t { font-size: 11px; color: #6b7280; }
  .player-stat { text-align: right; min-width: 56px; }
  .player-stat .v { font-weight: 700; font-size: 14px; }
  .player-stat .l { font-size: 10px; color: #6b7280; }
  .matchup-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px; border-bottom: 1px solid #1f2937;
  }
  .matchup-row:last-child { border-bottom: none; }
  .matchup-team { flex: 1; }
  .matchup-team.right { text-align: right; }
  .matchup-team .n { font-weight: 600; color: #f3f4f6; font-size: 14px; }
  .matchup-team .o { font-size: 11px; color: #6b7280; }
  .matchup-score { font-size: 22px; font-weight: 800; padding: 0 16px; }
  .win { color: #22c55e; }
  .lose { color: #ef4444; }
  .vs { color: #6b7280; font-size: 12px; font-weight: 600; padding: 0 8px; }
  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table th {
    text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.5px; color: #9ca3af; text-transform: uppercase;
    border-bottom: 1px solid #1f2937;
  }
  .standings-table td {
    padding: 12px; border-bottom: 1px solid #1f2937; font-size: 14px;
  }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table .rank {
    width: 24px; height: 24px; border-radius: 50%; background: #1f2937;
    color: #9ca3af; font-weight: 700; font-size: 12px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .standings-table .rank.top { background: #fbbf24; color: #000; }
  .standings-table .my-row { background: #1e3a8a22; }
  .filters {
    display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 12px; background: #1f2937; color: #9ca3af;
    border-radius: 6px; font-size: 12px; font-weight: 600;
  }
  .filter-btn.active { background: #3b82f6; color: #fff; }
  .search-input {
    width: 100%; padding: 10px 14px; background: #1f2937;
    border: 1px solid #374151; border-radius: 8px; color: #f3f4f6;
    font-size: 14px; margin-bottom: 12px;
  }
  .search-input:focus { outline: none; border-color: #3b82f6; }
  .watch-btn {
    padding: 6px 10px; background: #1f2937; color: #9ca3af;
    border-radius: 6px; font-size: 11px; font-weight: 600;
  }
  .watch-btn.watched { background: #fbbf24; color: #000; }
  .empty {
    text-align: center; padding: 40px 20px; color: #6b7280; font-size: 14px;
  }
  .footer {
    margin-top: 40px; padding: 20px 0; border-top: 1px solid #1f2937;
    text-align: center; color: #6b7280; font-size: 12px;
  }
  .draft-row {
    display: flex; align-items: flex-start; gap: 12px; padding: 14px;
    border-bottom: 1px solid #1f2937;
  }
  .draft-row:last-child { border-bottom: none; }
  .draft-rank {
    width: 36px; height: 36px; border-radius: 50%; background: #1f2937;
    color: #9ca3af; font-weight: 800; font-size: 13px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .draft-rank.t1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
  .draft-rank.t2 { background: linear-gradient(135deg, #a78bfa, #8b5cf6); color: #fff; }
  .draft-rank.t3 { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: #fff; }
  .draft-rank.t4 { background: #065f46; color: #d1fae5; }
  .draft-rank.t5 { background: #374151; color: #d1d5db; }
  .draft-rank.t6 { background: #1f2937; color: #9ca3af; }
  .draft-rank.t7 { background: #111827; color: #6b7280; border: 1px solid #374151; }
  .draft-body { flex: 1; min-width: 0; }
  .draft-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .draft-name { font-weight: 700; font-size: 15px; color: #f3f4f6; }
  .draft-ytd { font-size: 11px; color: #60a5fa; font-weight: 600; }
  .draft-note { font-size: 13px; color: #9ca3af; line-height: 1.5; }
  .tier-banner {
    padding: 8px 14px; background: #1f2937; color: #d1d5db;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    border-top: 1px solid #374151; border-bottom: 1px solid #374151;
  }
  .tier-banner.t1 { background: #422006; color: #fbbf24; }
  .tier-banner.t2 { background: #2e1065; color: #a78bfa; }
  .tier-banner.t3 { background: #1e3a8a; color: #60a5fa; }
  @media (max-width: 640px) {
    .app { padding: 14px; }
    .hero-name { font-size: 22px; }
    .player-stat { min-width: 44px; }
    .player-row { padding: 10px 8px; gap: 8px; }
    .slot-label { width: 36px; }
  }
</style>
</head>

const MATCHUPS = [

const SLOTS = ["QB","RB","RB","WR","WR","TE","FLEX","K","DEF"];
const MY_TEAM = 1;

const gp = (id) => PLAYERS.find(p => p.id === id);
const gt = (id) => TEAMS.find(t => t.id === id);

// ============ COMPONENTS ============
function PlayerRow({ p, slot, onWatch, watched }) {
  if (!p) return null;
  return (
    <div className="player-row">
      {slot && <div className="slot-label">{slot}</div>}
      <span className={"pos-badge pos-" + p.pos}>{p.pos}</span>
      <div className="player-name">
        <div className="n">{p.n}</div>
        <div className="t">{p.tm}</div>
      </div>
      {p.st !== "Healthy" && <span className={"status-badge status-" + p.st}>{p.st}</span>}
      <div className="player-stat">
        <div className="v" style={{color:"#f3f4f6"}}>{p.proj.toFixed(1)}</div>
        <div className="l">PROJ</div>
      </div>
      <div className="player-stat">
        <div className="v" style={{color:"#60a5fa"}}>{p.ytd.toFixed(1)}</div>
        <div className="l">YTD</div>
      </div>
      {onWatch && (
        <button className={"watch-btn" + (watched ? " watched" : "")} onClick={() => onWatch(p.id)}>
          {watched ? "★" : "☆"}
        </button>
      )}
    </div>
  );
}

function MyTeamView() {
  const team = gt(MY_TEAM);
  const r = ROSTERS[MY_TEAM];
  const starters = r.st.map(gp);
  const bench = r.bn.map(gp);
  const projTotal = starters.reduce((s,p) => s + p.proj, 0);
  const m = MATCHUPS.find(x => x.h === MY_TEAM || x.a === MY_TEAM);
  const isHome = m.h === MY_TEAM;
  const myScore = isHome ? m.hs : m.as;
  const oppScore = isHome ? m.as : m.hs;
  const opp = gt(isHome ? m.a : m.h);
  const winning = myScore > oppScore;

  return (
    <div>
      <div className="hero">
        <div className="hero-label">MY TEAM</div>
        <div className="hero-name">{team.name}</div>
        <div className="hero-stats">
          <div>
            <div className="hero-stat-label">RECORD</div>
            <div className="hero-stat-val">{team.w}-{team.l}</div>
          </div>
          <div>
            <div className="hero-stat-label">POINTS FOR</div>
            <div className="hero-stat-val">{team.pf.toFixed(1)}</div>
          </div>
          <div>
            <div className="hero-stat-label">PROJ WEEK {LEAGUE.week}</div>
            <div className="hero-stat-val">{projTotal.toFixed(1)}</div>
          </div>
        </div>
      </div>

      <div className="card">
        <h2>Week {LEAGUE.week} Matchup</h2>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:14, fontWeight:700}}>{team.name}</div>
            <div style={{fontSize:30, fontWeight:800}} className={winning ? "win" : "lose"}>
              {myScore.toFixed(1)}
            </div>
          </div>
          <div className="vs">VS</div>
          <div style={{flex:1, textAlign:"right"}}>
            <div style={{fontSize:14, fontWeight:700}}>{opp.name}</div>
            <div style={{fontSize:30, fontWeight:800}} className={!winning ? "win" : "lose"}>
              {oppScore.toFixed(1)}
            </div>
          </div>
        </div>
      </div>

      <div className="card" style={{padding:0}}>
        <div style={{padding:"14px 16px 10px"}}><h2 style={{margin:0}}>Starters</h2></div>
        {starters.map((p, i) => <PlayerRow key={i} p={p} slot={SLOTS[i]} />)}
      </div>

      <div className="card" style={{padding:0}}>
        <div style={{padding:"14px 16px 10px"}}><h2 style={{margin:0}}>Bench</h2></div>
        {bench.map((p, i) => <PlayerRow key={i} p={p} slot="BN" />)}
      </div>
    </div>
  );
}

function StandingsView() {
  const sorted = [...TEAMS].sort((a, b) => {
    if (b.w !== a.w) return b.w - a.w;
    return b.pf - a.pf;
  });
  return (
    <div className="card" style={{padding:0, overflow:"hidden"}}>
      <table className="standings-table">
        <thead>
          <tr>
            <th style={{width:40}}>#</th>
            <th>Team</th>
            <th style={{textAlign:"center"}}>W-L</th>
            <th style={{textAlign:"right"}}>PF</th>
            <th style={{textAlign:"right"}}>PA</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map((t, i) => (
            <tr key={t.id} className={t.id === MY_TEAM ? "my-row" : ""}>
              <td><span className={"rank" + (i < 3 ? " top" : "")}>{i + 1}</span></td>
              <td>
                <div style={{fontWeight:600}}>{t.name}</div>
                <div style={{fontSize:11, color:"#6b7280"}}>{t.owner}{t.id === MY_TEAM ? " (you)" : ""}</div>
              </td>
              <td style={{textAlign:"center", fontWeight:700}}>{t.w}-{t.l}</td>
              <td style={{textAlign:"right"}}>{t.pf.toFixed(1)}</td>
              <td style={{textAlign:"right", color:"#9ca3af"}}>{t.pa.toFixed(1)}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function MatchupsView() {
  return (
    <div className="card" style={{padding:0}}>
      <div style={{padding:"14px 16px 10px"}}><h2 style={{margin:0}}>Week {LEAGUE.week} Matchups</h2></div>
      {MATCHUPS.map((m, i) => {
        const home = gt(m.h), away = gt(m.a);
        const homeWin = m.hs > m.as;
        return (
          <div key={i} className="matchup-row">
            <div className="matchup-team">
              <div className="n">{home.name}</div>
              <div className="o">{home.owner}</div>
            </div>
            <div className={"matchup-score " + (homeWin ? "win" : "lose")}>{m.hs.toFixed(1)}</div>
            <div className="vs">VS</div>
            <div className={"matchup-score " + (!homeWin ? "win" : "lose")}>{m.as.toFixed(1)}</div>
            <div className="matchup-team right">
              <div className="n">{away.name}</div>
              <div className="o">{away.owner}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function PlayersView({ watchlist, toggleWatch }) {
  const [filter, setFilter] = useState("ALL");
  const [search, setSearch] = useState("");
  const filtered = useMemo(() => {
    let list = PLAYERS;
    if (filter !== "ALL") list = list.filter(p => p.pos === filter);
    if (search) list = list.filter(p => p.n.toLowerCase().includes(search.toLowerCase()));
    return [...list].sort((a, b) => b.ytd - a.ytd);
  }, [filter, search]);

  const positions = ["ALL", "QB", "RB", "WR", "TE", "K", "DEF"];

  return (
    <div>
      <input
        className="search-input"
        placeholder="Search players..."
        value={search}
        onChange={e => setSearch(e.target.value)}
      />
      <div className="filters">
        {positions.map(pos => (
          <button
            key={pos}
            className={"filter-btn" + (filter === pos ? " active" : "")}
            onClick={() => setFilter(pos)}
          >{pos}</button>
        ))}
      </div>
      <div className="card" style={{padding:0}}>
        {filtered.length === 0 ? (
          <div className="empty">No players match your filters.</div>
        ) : (
          filtered.map(p => (
            <PlayerRow
              key={p.id}
              p={p}
              onWatch={toggleWatch}
              watched={watchlist.includes(p.id)}
            />
          ))
        )}
      </div>
    </div>
  );
}

function WatchlistView({ watchlist, toggleWatch }) {
  const players = watchlist.map(gp).filter(Boolean);
  return (
    <div>
      <div className="card">
        <h2>Watchlist</h2>
        <div style={{fontSize:13, color:"#9ca3af"}}>
          Track players you're interested in — even if they're not on your roster.
        </div>
      </div>
      <div className="card" style={{padding:0}}>
        {players.length === 0 ? (
          <div className="empty">
            No players on your watchlist yet.<br />
            Go to the Players tab and tap ☆ to add one.
          </div>
        ) : (
          players.map(p => (
            <PlayerRow key={p.id} p={p} onWatch={toggleWatch} watched={true} />
          ))
        )}
      </div>
    </div>
  );
}

function DraftBoardView() {
  const tierLabels = {
    1: "TIER 1 — ELITE / FIRST ROUND LOCKS",
    2: "TIER 2 — ROUND 1-2 CORNERSTONES",
    3: "TIER 3 — ROUND 3-4 BUILDERS",
    4: "TIER 4 — ROUND 4-6 VALUE",
    5: "TIER 5 — ROUND 6-8 UPSIDE",
    6: "TIER 6 — ROUND 8-10 DEPTH",
    7: "TIER 7 — LATE ROUND DART THROWS",
  };

  return (
    <div>
      <div className="hero" style={{background:"linear-gradient(135deg, #422006 0%, #78350f 100%)"}}>
        <div className="hero-label" style={{color:"#fcd34d"}}>2026 DRAFT BOARD</div>
        <div className="hero-name">Top 50 PPR Rankings</div>
        <div style={{fontSize:13, color:"#fde68a", marginTop:10, lineHeight:1.5}}>
          My rankings for a 10-team PPR draft, based on 2025 season-end production,
          2026 workload projections, age, and injury risk. Tiers grouped by round value.
        </div>
      </div>

      <div className="card" style={{padding:0, overflow:"hidden"}}>
        {DRAFT_BOARD.map((d, i) => {
          const p = gp(d.pid);
          if (!p) return null;
          const showTier = i === 0 || DRAFT_BOARD[i - 1].tier !== d.tier;
          return (
            <div key={d.rank}>
              {showTier && (
                <div className={"tier-banner t" + d.tier}>{tierLabels[d.tier]}</div>
              )}
              <div className="draft-row">
                <div className={"draft-rank t" + d.tier}>{d.rank}</div>
                <div className="draft-body">
                  <div className="draft-head">
                    <span className={"pos-badge pos-" + p.pos}>{p.pos}</span>
                    <span className="draft-name">{p.n}</span>
                    <span style={{fontSize:12, color:"#6b7280"}}>{p.tm}</span>
                    <span className="draft-ytd">2025: {p.ytd.toFixed(1)} pts ({p.avg.toFixed(1)} avg)</span>
                  </div>
                  <div className="draft-note">{d.note}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("team");
  const [watchlist, setWatchlist] = useState([]);

  const toggleWatch = (id) => {
    setWatchlist(wl => wl.includes(id) ? wl.filter(x => x !== id) : [...wl, id]);
  };

  const tabs = [
    { id: "team",      label: "My Team" },
    { id: "matchups",  label: "Matchups" },
    { id: "standings", label: "Standings" },
    { id: "players",   label: "Players" },
    { id: "draft",     label: "Draft Board" },
    { id: "watchlist", label: "Watchlist" + (watchlist.length ? ` (${watchlist.length})` : "") },
  ];

  return (
    <div className="app">
      <div className="header">
        <div className="logo">Fantasy<span>Tracker</span></div>
        <div className="week-badge">Week {LEAGUE.week} • {LEAGUE.scoring}</div>
      </div>
      <div className="tabs">
        {tabs.map(t => (
          <button
            key={t.id}
            className={"tab" + (tab === t.id ? " active" : "")}
            onClick={() => setTab(t.id)}
          >{t.label}</button>
        ))}
      </div>
      {tab === "team"      && <MyTeamView />}
      {tab === "matchups"  && <MatchupsView />}
      {tab === "standings" && <StandingsView />}
      {tab === "players"   && <PlayersView watchlist={watchlist} toggleWatch={toggleWatch} />}
      {tab === "draft"     && <DraftBoardView />}
      {tab === "watchlist" && <WatchlistView watchlist={watchlist} toggleWatch={toggleWatch} />}
      <div className="footer">
        {LEAGUE.name} • {LEAGUE.teams} teams • {LEAGUE.scoring} scoring • 2025 season-end stats (Sleeper API integration pending)
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
